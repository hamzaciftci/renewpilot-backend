version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: renewpilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: renewpilot
      POSTGRES_PASSWORD: renewpilot
      POSTGRES_DB: renewpilot_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U renewpilot -d renewpilot_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: renewpilot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
